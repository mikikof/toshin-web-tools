<script src="../../assets/tool-helpers.js"></script>
<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";

const { Slider, ToolState, formatNumber } = window.toshin;

/* ---------- State ---------- */
const state = new ToolState({ a: 1.0, b: 1.0 });

/* ---------- Sliders ---------- */
new Slider("a", { format: (v) => v.toFixed(2) }).onChange((v) => state.set({ a: v }));
new Slider("b", { format: (v) => v.toFixed(2) }).onChange((v) => state.set({ b: v }));

/* ---------- Three.js scene ---------- */
const container = document.getElementById("viz3d");
const w0 = () => container.clientWidth;
const h0 = () => container.clientHeight;

const scene = new THREE.Scene();
scene.background = new THREE.Color(getComputedStyle(document.body).getPropertyValue("--tool-bg2").trim() || "#ffffff");

const camera = new THREE.PerspectiveCamera(45, w0() / h0(), 0.1, 100);
camera.position.set(4, 4, 5);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(w0(), h0());
renderer.setPixelRatio(window.devicePixelRatio);
container.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const dir = new THREE.DirectionalLight(0xffffff, 0.8);
dir.position.set(5, 8, 4);
scene.add(dir);

// 軸
const axes = new THREE.AxesHelper(2);
scene.add(axes);

// 曲面 (TODO: テーマに応じた数式)
let surfaceMesh = null;
function buildSurface(a, b) {
  if (surfaceMesh) {
    scene.remove(surfaceMesh);
    surfaceMesh.geometry.dispose();
    surfaceMesh.material.dispose();
  }
  const N = 60;
  const range = 2;
  const positions = [];
  const indices = [];
  for (let i = 0; i <= N; i++) {
    for (let j = 0; j <= N; j++) {
      const x = -range + (2 * range) * i / N;
      const y = -range + (2 * range) * j / N;
      // TODO: z = f(x, y; a, b)
      const z = (x * x) / (a * a) + (y * y) / (b * b);
      positions.push(x, z, y);  // y-up: 数学の z を Three の y に
    }
  }
  for (let i = 0; i < N; i++) {
    for (let j = 0; j < N; j++) {
      const k = i * (N + 1) + j;
      indices.push(k, k + 1, k + N + 1);
      indices.push(k + 1, k + N + 2, k + N + 1);
    }
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute("position", new THREE.Float32BufferAttribute(positions, 3));
  geo.setIndex(indices);
  geo.computeVertexNormals();
  const mat = new THREE.MeshStandardMaterial({
    color: 0x0ea5e9,
    metalness: 0.1,
    roughness: 0.6,
    side: THREE.DoubleSide,
    flatShading: false,
    transparent: true,
    opacity: 0.85,
  });
  surfaceMesh = new THREE.Mesh(geo, mat);
  scene.add(surfaceMesh);
}

state.subscribe(({ a, b }) => {
  buildSurface(a, b);
  document.getElementById("kpi").textContent = `a=${formatNumber(a, 2)}, b=${formatNumber(b, 2)}`;
});

window.addEventListener("resize", () => {
  camera.aspect = w0() / h0();
  camera.updateProjectionMatrix();
  renderer.setSize(w0(), h0());
});

document.getElementById("btnReset").addEventListener("click", () => {
  controls.reset();
  camera.position.set(4, 4, 5);
});
document.getElementById("preset1").addEventListener("click", () => {
  state.set({ a: 1, b: 1 });
  document.getElementById("a").value = 1; document.getElementById("b").value = 1;
});
document.getElementById("preset2").addEventListener("click", () => {
  state.set({ a: 2, b: 0.5 });
  document.getElementById("a").value = 2; document.getElementById("b").value = 0.5;
});
document.getElementById("preset3").addEventListener("click", () => {
  state.set({ a: 0.5, b: 2 });
  document.getElementById("a").value = 0.5; document.getElementById("b").value = 2;
});

// init
buildSurface(state.state.a, state.state.b);
document.getElementById("kpi").textContent = "a=1.00, b=1.00";

(function loop() {
  controls.update();
  renderer.render(scene, camera);
  requestAnimationFrame(loop);
})();
</script>
